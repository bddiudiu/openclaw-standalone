name: Build OpenClaw Standalone

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Edition (zh=汉化版, en=官方原版, both=两个都构建)'
        type: choice
        options:
          - both
          - zh
          - en
        default: 'both'
      openclaw_version:
        description: 'OpenClaw version to package (leave empty for latest)'
        required: false
        default: ''
      upload_r2:
        description: 'Upload to Cloudflare R2'
        required: false
        type: boolean
        default: true
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  NODE_VERSION: '22'
  NPM_REGISTRY: 'https://registry.npmmirror.com'

jobs:
  # --- Resolve versions for both editions ---
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version_zh: ${{ steps.ver.outputs.version_zh }}
      version_en: ${{ steps.ver.outputs.version_en }}
    steps:
      - name: Resolve OpenClaw versions
        id: ver
        run: |
          INPUT_VER="${{ github.event.inputs.openclaw_version }}"
          REGISTRY="${{ env.NPM_REGISTRY }}"

          # Chinese edition
          if [ -n "$INPUT_VER" ]; then
            echo "version_zh=$INPUT_VER" >> $GITHUB_OUTPUT
          else
            VER=$(npm view "@qingchencloud/openclaw-zh" version --registry "$REGISTRY" 2>/dev/null || \
                  npm view "@qingchencloud/openclaw-zh" version 2>/dev/null || echo "unknown")
            echo "version_zh=$VER" >> $GITHUB_OUTPUT
          fi

          # Official edition
          if [ -n "$INPUT_VER" ]; then
            echo "version_en=$INPUT_VER" >> $GITHUB_OUTPUT
          else
            VER=$(npm view "openclaw" version --registry "$REGISTRY" 2>/dev/null || \
                  npm view "openclaw" version 2>/dev/null || echo "unknown")
            echo "version_en=$VER" >> $GITHUB_OUTPUT
          fi

          cat $GITHUB_OUTPUT

  # --- Build matrix: 2 editions × 4 platforms = 8 parallel builds ---
  build:
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        edition: [zh, en]
        os: [windows-latest, macos-15, ubuntu-latest, ubuntu-24.04-arm]
        include:
          - os: windows-latest
            platform: win-x64
            archive_ext: zip
          - os: macos-15
            platform: mac-arm64
            archive_ext: tar.gz
          - os: ubuntu-latest
            platform: linux-x64
            archive_ext: tar.gz
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            archive_ext: tar.gz
          - edition: zh
            pkg: '@qingchencloud/openclaw-zh'
          - edition: en
            pkg: 'openclaw'

    # Skip builds when user selects a specific edition via workflow_dispatch
    if: >-
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.edition == 'both' ||
      github.event.inputs.edition == matrix.edition

    runs-on: ${{ matrix.os }}

    env:
      PKG_VERSION: ${{ matrix.edition == 'zh' && needs.resolve-version.outputs.version_zh || needs.resolve-version.outputs.version_en }}
      ARCHIVE_PREFIX: ${{ matrix.edition == 'zh' && 'openclaw-zh' || 'openclaw' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Show environment
        run: |
          node --version
          npm --version
          echo "Edition: ${{ matrix.edition }} (${{ matrix.pkg }})"
          echo "Platform: ${{ matrix.platform }}"
          echo "Version: ${{ env.PKG_VERSION }}"

      # ===== Build =====
      - name: Enable Windows Long Paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          git config --system core.longpaths true

      - name: Create build directory
        shell: bash
        run: mkdir -p build/${{ matrix.platform }}

      - name: Install OpenClaw
        shell: bash
        working-directory: build/${{ matrix.platform }}
        run: |
          echo '{ "name": "openclaw-standalone-build", "private": true }' > package.json
          PKG_SPEC="${{ matrix.pkg }}"
          [ "${{ env.PKG_VERSION }}" != "unknown" ] && [ -n "${{ env.PKG_VERSION }}" ] && PKG_SPEC="${{ matrix.pkg }}@${{ env.PKG_VERSION }}"
          echo "Installing: $PKG_SPEC"
          npm install "$PKG_SPEC" \
            --registry "${{ env.NPM_REGISTRY }}" \
            --include=optional
          rm -f package.json package-lock.json

      - name: Copy Node.js binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp "$(which node)" "build/${{ matrix.platform }}/node"
          chmod +x "build/${{ matrix.platform }}/node"

      - name: Copy Node.js binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item (Get-Command node).Source "build/${{ matrix.platform }}/node.exe"

      - name: Copy shim (Unix)
        if: runner.os != 'Windows'
        run: |
          cp shims/openclaw "build/${{ matrix.platform }}/openclaw"
          chmod +x "build/${{ matrix.platform }}/openclaw"

      - name: Copy shim (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "shims/openclaw.cmd" "build/${{ matrix.platform }}/openclaw.cmd"

      - name: Write VERSION file
        shell: bash
        run: |
          cat > "build/${{ matrix.platform }}/VERSION" <<EOF
          openclaw_version=${{ env.PKG_VERSION }}
          edition=${{ matrix.edition }}
          package=${{ matrix.pkg }}
          node_version=$(node --version)
          platform=${{ matrix.platform }}
          build_date=$(date -u '+%Y-%m-%d %H:%M:%S UTC')
          EOF

      # ===== Patch upstream bugs =====
      - name: Patch missing changelog.js (upstream bug in @mariozechner/pi-coding-agent)
        shell: bash
        run: |
          STUB="build/${{ matrix.platform }}/node_modules/@mariozechner/pi-coding-agent/dist/utils/changelog.js"
          NEEDS_PATCH=false
          if [ ! -f "$STUB" ]; then
            NEEDS_PATCH=true
          elif ! grep -q 'export function getChangelogPath' "$STUB" 2>/dev/null; then
            NEEDS_PATCH=true
          fi
          if [ "$NEEDS_PATCH" = true ]; then
            echo "Patching: creating/replacing changelog.js stub"
            mkdir -p "$(dirname "$STUB")"
            cat > "$STUB" <<'STUBEOF'
          export function getChangelogPath() { return null }
          export function parseChangelog() { return [] }
          export function getNewEntries() { return [] }
          STUBEOF
          fi

      # ===== Cleanup to reduce size =====
      # IMPORTANT: Never clean files inside the openclaw package itself (openclaw/ or @qingchencloud/openclaw-zh/).
      # Its dist/ contains Vite/Rollup chunks with hash names (history-CMXy8eH-.js, changelog-*.js, etc.)
      # that can match cleanup patterns. Only clean OTHER dependency packages.
      - name: Cleanup unnecessary files (Unix)
        if: runner.os != 'Windows'
        run: |
          NM="build/${{ matrix.platform }}/node_modules"
          echo "Before: $(du -sm "$NM" | cut -f1)MB"
          find "$NM" -type f \( \
            -name "*.ts" ! -name "*.d.ts" -o \
            -name "*.map" -o \
            -name "CHANGELOG*" -o \
            -name "HISTORY*" -o \
            -name "AUTHORS*" -o \
            -name ".npmignore" -o \
            -name ".eslintrc*" -o \
            -name ".prettierrc*" -o \
            -name "Makefile" -o \
            -name ".editorconfig" -o \
            -name ".travis.yml" \
          \) ! -name "*.js" ! -name "*.mjs" ! -name "*.cjs" \
             ! -path "*/openclaw/*" \
             ! -path "*/@qingchencloud/openclaw-zh/*" \
             -delete 2>/dev/null || true
          find "$NM" -type d \( \
            -name "test" -o -name "tests" -o -name "__tests__" -o \
            -name "spec" -o -name "example" -o -name "examples" -o \
            -name ".github" -o -name ".circleci" \
          \) ! -path "*/openclaw/*" \
             ! -path "*/@qingchencloud/openclaw-zh/*" \
             -exec rm -rf {} + 2>/dev/null || true
          echo "After: $(du -sm "$NM" | cut -f1)MB"

      - name: Cleanup unnecessary files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nmDir = "build/${{ matrix.platform }}/node_modules"
          $patterns = @("*.ts", "*.map", "CHANGELOG*", "HISTORY*", "AUTHORS*",
                        ".npmignore", ".eslintrc*", ".prettierrc*", "Makefile",
                        ".editorconfig", ".travis.yml")
          $dirPatterns = @("test", "tests", "__tests__", "spec", "example", "examples", ".github", ".circleci")
          # Protect the main app package from cleanup
          function Test-Protected($path) {
            return ($path -match '[\\/](openclaw|@qingchencloud[\\/]openclaw-zh)[\\/]')
          }
          foreach ($p in $patterns) {
            Get-ChildItem -Path $nmDir -Recurse -Filter $p -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -notlike "*.d.ts" -and $_.Extension -notin @('.js', '.mjs', '.cjs') -and -not (Test-Protected $_.FullName) } |
              Remove-Item -Force -ErrorAction SilentlyContinue
          }
          foreach ($d in $dirPatterns) {
            Get-ChildItem -Path $nmDir -Recurse -Directory -Filter $d -ErrorAction SilentlyContinue |
              Where-Object { -not (Test-Protected $_.FullName) } |
              Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          }

      # ===== Package =====
      - name: Create archive (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p output
          mv "build/${{ matrix.platform }}" "build/openclaw"
          ARCHIVE="${{ env.ARCHIVE_PREFIX }}-${{ env.PKG_VERSION }}-${{ matrix.platform }}.tar.gz"
          tar -czf "output/$ARCHIVE" -C build openclaw
          mv "build/openclaw" "build/${{ matrix.platform }}"
          # Generate checksum
          cd output
          shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256" 2>/dev/null || \
          sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256" 2>/dev/null || true
          ls -lh

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path output | Out-Null
          $zipName = "${{ env.ARCHIVE_PREFIX }}-${{ env.PKG_VERSION }}-win-x64.zip"
          Rename-Item "build/${{ matrix.platform }}" "openclaw"
          Compress-Archive -Path "build/openclaw" -DestinationPath "output/$zipName" -CompressionLevel Optimal
          Rename-Item "build/openclaw" "${{ matrix.platform }}"
          # Generate checksum
          $hash = (Get-FileHash "output/$zipName" -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Set-Content "output/$zipName.sha256"
          Get-ChildItem output

      # ===== Inno Setup installer (Windows only) =====
      # Remove deeply nested node_modules AFTER zip is created but BEFORE Inno Setup,
      # to avoid MAX_PATH (260 char) errors. The zip archive retains all files.
      - name: Flatten nested node_modules for Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $nmDir = "build/${{ matrix.platform }}/node_modules"
          foreach ($pkgPath in @("$nmDir\@qingchencloud\openclaw-zh", "$nmDir\openclaw")) {
            if (Test-Path $pkgPath) {
              $nested = Get-ChildItem -Path $pkgPath -Directory -Filter "node_modules" -Recurse -ErrorAction SilentlyContinue
              if ($nested) {
                Write-Host "Removing $($nested.Count) nested node_modules dirs inside $(Split-Path $pkgPath -Leaf) for Inno Setup"
                $nested | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
              }
            }
          }

      - name: Build Inno Setup installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ env.PKG_VERSION }}"
          $prefix = "${{ env.ARCHIVE_PREFIX }}"
          $sourceDir = "${{ github.workspace }}\build\${{ matrix.platform }}"
          $outputDir = "${{ github.workspace }}\output"
          # Inno Setup is pre-installed on windows-latest
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DAppVersion=$version" `
            "/DAppPrefix=$prefix" `
            "/DSourceDir=$sourceDir" `
            "/DOutputDir=$outputDir" `
            "installer\setup.iss"

      # ===== Upload artifacts =====
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_PREFIX }}-${{ matrix.platform }}
          path: output/*
          retention-days: 30

  # --- Create Release ---
  release:
    needs: [resolve-version, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect all files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -name "*.sha256" \) \
            -exec cp {} release/ \;
          ls -lh release/

      - name: Generate latest.json manifest
        run: |
          VER_ZH="${{ needs.resolve-version.outputs.version_zh }}"
          VER_EN="${{ needs.resolve-version.outputs.version_en }}"
          cat > release/latest.json <<EOF
          {
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "editions": {
              "zh": {
                "version": "$VER_ZH",
                "package": "@qingchencloud/openclaw-zh",
                "downloads": {
                  "win-x64": { "zip": "openclaw-zh-$VER_ZH-win-x64.zip", "installer": "openclaw-zh-$VER_ZH-win-x64-setup.exe" },
                  "mac-arm64": { "archive": "openclaw-zh-$VER_ZH-mac-arm64.tar.gz" },
                  "linux-x64": { "archive": "openclaw-zh-$VER_ZH-linux-x64.tar.gz" },
                  "linux-arm64": { "archive": "openclaw-zh-$VER_ZH-linux-arm64.tar.gz" }
                }
              },
              "en": {
                "version": "$VER_EN",
                "package": "openclaw",
                "downloads": {
                  "win-x64": { "zip": "openclaw-$VER_EN-win-x64.zip", "installer": "openclaw-$VER_EN-win-x64-setup.exe" },
                  "mac-arm64": { "archive": "openclaw-$VER_EN-mac-arm64.tar.gz" },
                  "linux-x64": { "archive": "openclaw-$VER_EN-linux-x64.tar.gz" },
                  "linux-arm64": { "archive": "openclaw-$VER_EN-linux-arm64.tar.gz" }
                }
              }
            }
          }
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.resolve-version.outputs.version_zh }}
          name: OpenClaw ${{ needs.resolve-version.outputs.version_zh }}
          body: |
            ## OpenClaw 独立安装包 / Standalone Installer

            **零依赖安装** — 无需 Node.js，无需 npm，下载即用！
            **Zero-dependency** — No Node.js, no npm, just download and run!

            ### 📥 汉化版 / Chinese Edition (`openclaw-zh-*`)

            | 平台 Platform | 文件 File | 说明 |
            |------|------|------|
            | Windows x64 | `openclaw-zh-*-win-x64-setup.exe` | **推荐** 引导安装 |
            | Windows x64 | `openclaw-zh-*-win-x64.zip` | 绿色免安装 |
            | macOS ARM64 | `openclaw-zh-*-mac-arm64.tar.gz` | Apple Silicon |
            | Linux x64 | `openclaw-zh-*-linux-x64.tar.gz` | 解压即用 |
            | Linux ARM64 | `openclaw-zh-*-linux-arm64.tar.gz` | 树莓派等 |

            ### � Official Edition (`openclaw-*`)

            | Platform | File | Note |
            |------|------|------|
            | Windows x64 | `openclaw-*-win-x64-setup.exe` | Guided installer |
            | Windows x64 | `openclaw-*-win-x64.zip` | Portable |
            | macOS ARM64 | `openclaw-*-mac-arm64.tar.gz` | Apple Silicon |
            | Linux x64 | `openclaw-*-linux-x64.tar.gz` | Extract & run |
            | Linux ARM64 | `openclaw-*-linux-arm64.tar.gz` | Raspberry Pi etc. |

            ---
            由 [晴辰云](https://gpt.qt.cool) 构建 · [ClawPanel](https://github.com/qingchencloud/clawpanel)
          files: release/*
          draft: false
          prerelease: false

  # --- Upload to R2 ---
  upload-r2:
    needs: [resolve-version, build, release]
    runs-on: ubuntu-latest
    if: >-
      (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.upload_r2 == 'true')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Collect files
        run: |
          mkdir -p upload
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" -o -name "*.exe" -o -name "*.sha256" \) \
            -exec cp {} upload/ \;
          ls -lh upload/

      - name: Setup Node.js for wrangler
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install wrangler
        run: npm install -g wrangler

      - name: Upload files to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VER_ZH="${{ needs.resolve-version.outputs.version_zh }}"
          VER_EN="${{ needs.resolve-version.outputs.version_en }}"
          FAILED=0
          for file in upload/*; do
            FILENAME=$(basename "$file")
            SIZE_MB=$(( $(stat --format=%s "$file") / 1048576 ))
            echo "Uploading $FILENAME (${SIZE_MB}MB) ..."
            if [ "$SIZE_MB" -gt 290 ]; then
              echo "Skipping $FILENAME (${SIZE_MB}MB > 290MB wrangler limit, available in GitHub Release)"
              continue
            fi
            # Route to edition-specific R2 paths
            if echo "$FILENAME" | grep -q "^openclaw-zh-"; then
              PREFIX="openclaw-standalone/zh/${VER_ZH}"
            else
              PREFIX="openclaw-standalone/en/${VER_EN}"
            fi
            if wrangler r2 object put "clawpanel-releases/${PREFIX}/${FILENAME}" --file "$file" --remote; then
              echo "Uploaded: $FILENAME"
            else
              echo "Failed: $FILENAME, continuing..."
              FAILED=$((FAILED + 1))
            fi
          done
          echo "Upload complete (skipped/failed: $FAILED)"

      - name: Upload latest.json to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VER_ZH="${{ needs.resolve-version.outputs.version_zh }}"
          VER_EN="${{ needs.resolve-version.outputs.version_en }}"
          cat > /tmp/latest.json <<EOF
          {
            "date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "editions": {
              "zh": { "version": "$VER_ZH", "base_url": "https://dl.qrj.ai/openclaw-standalone/zh/$VER_ZH" },
              "en": { "version": "$VER_EN", "base_url": "https://dl.qrj.ai/openclaw-standalone/en/$VER_EN" }
            }
          }
          EOF
          wrangler r2 object put "clawpanel-releases/openclaw-standalone/latest.json" \
            --file /tmp/latest.json --content-type application/json --remote
          echo "latest.json updated (zh=$VER_ZH, en=$VER_EN)"
